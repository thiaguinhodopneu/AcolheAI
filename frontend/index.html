<!DOCTYPE html>
<html>

<head>
    <title>AcolheAI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <div class="header">
        🤖 AcolheAI
    </div>

    <div id="chat"></div>

    <div class="input-area">
        <input id="texto" placeholder="Digite como você está se sentindo...">
        <button onclick="enviar()">➤</button>
    </div>

</div>

<script>

document.getElementById("texto").focus();

document.getElementById("texto").addEventListener("keypress", function(e) {
    if (e.key === "Enter") enviar();
});

window.onload = function() {
    adicionarMensagem(
        "Oi, eu sou o AcolheAI. Estou aqui pra te ouvir. Como você está se sentindo hoje?",
        "bot"
    );
}

let historico = [];

function adicionarMensagem(texto, tipo) {

    let chat = document.getElementById("chat");

    let hora = new Date().toLocaleTimeString([], {
        hour: '2-digit',
        minute:'2-digit'
    });

    let div = document.createElement("div");

    div.classList.add("msg", tipo);

    div.innerHTML = `
        ${texto}
        <div style="font-size:10px; margin-top:5px; opacity:0.6;">
            ${hora}
        </div>
    `;

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;
}

function mostrarDigitando() {

    let chat = document.getElementById("chat");

    let div = document.createElement("div");

    div.classList.add("msg", "bot", "digitando");

    div.id = "digitando";

    div.innerHTML = "<span></span><span></span><span></span>";

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;
}

function removerDigitando() {

    let d = document.getElementById("digitando");

    if (d) d.remove();
}

async function enviar() {

    let input = document.getElementById("texto");

    let texto = input.value.trim();

    if (texto === "") return;

    adicionarMensagem(texto, "user");

    input.value = "";

    historico.push({
        role: "user",
        content: texto
    });

    mostrarDigitando();

    try {

        const resposta = await fetch("/chat", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                mensagem: texto,
                historico: historico
            })
        });

        const dados = await resposta.json();

        removerDigitando();

        if (dados.resposta) {

            adicionarMensagem(dados.resposta, "bot");

            historico.push({
                role: "assistant",
                content: dados.resposta
            });

        } else {

            adicionarMensagem(
                "Desculpe, aconteceu um erro.",
                "bot"
            );
        }

    } catch (erro) {

        removerDigitando();

        adicionarMensagem(
            "Erro ao conectar com a IA.",
            "bot"
        );

        console.error(erro);
    }
}

</script>
